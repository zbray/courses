<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Website</title>

    <style>
      body {
        font-size: 16px;
        background-color: beige;
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
      }
      header {
        font-size: 30px;
        margin: 0;
      }
      header,
      nav {
        background-color: #aa80f3;
        color: white;
        padding: 20px;
      }
      nav ul {
        list-style: none;
      }
      p {
        font-weight: bold;
      }
      #button {
        background-color: #aa80f3;
        color: white;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        text-align: center;
        padding: 15px 32px;
        display: inline-block;
        /* text-decoration: none;
        display: inline-block;
        */
      }
    </style>
  </head>
  <body>
    <header>My Website</header>
    <nav>
      <ul>
        <li>Home</li>
        <li>About</li>
        <li>Contact</li>
      </ul>
    </nav>
    <main>
      <p>Welcome to My Website</p>
      <p>This is a simple website.</p>
      <button id="button" onclick="toggleCSS()">Toggle CSS</button>
      <div></div>
    </main>
    <footer>Copyright © Zach</footer>
  </body>
</html>
